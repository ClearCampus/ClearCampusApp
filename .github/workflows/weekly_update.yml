name: Weekly Club Update

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 6am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape clubs
        run: python webscraper.py

      - name: Embed clubs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python textembed.py

      - name: Sync Firestore & Pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python sync_database.py


      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tamu_clubs.json tamu_clubs_embedded.json pending_deletion.json
          git diff --cached --quiet || git commit -m "chore: weekly club data update $(date -u +%Y-%m-%d)"
          git push
